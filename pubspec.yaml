name: fast_food
description: "App about Fast Food"

publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.10.7


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  auto_route: ^11.1.0
  flutter_native_splash: ^2.4.7
  flutter_svg: ^2.2.3
  smooth_page_indicator: ^2.0.1
  google_fonts: ^8.0.2
  supabase_flutter: ^2.12.0
  injectable: ^2.7.1+4
  injectable_generator: ^2.12.1
  get_it: ^9.2.1
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  
  flutter_lints: ^6.0.0
  auto_route_generator: ^10.5.0
  build_runner: ^2.12.1
  flutter_launcher_icons: ^0.14.4


flutter:

  
  uses-material-design: true


  assets:
    - assets/images/
    - assets/icons/
    - assets/svg/
   


  fonts:
    - family: Metropolis
      fonts:
        - asset: assets/fonts/metropolis.thin.otf
  
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icon_one.png"
  adaptive_icon_background: "FFFFFF" 
  adaptive_icon_foreground: "assets/icons/icon_one.png" 

  